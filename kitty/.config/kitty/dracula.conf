# Gruvbox Dark Hard Theme Configuration for Kitty Terminal
# Based on the original Gruvbox color scheme by morhetz
# Using the darkest variant for maximum contrast
#
# Installation instructions:
#
#  cp this_config.conf ~/.config/kitty/
#  echo "include this_config.conf" >> ~/.config/kitty/kitty.conf
#
# Then reload kitty for the config to take affect.
# Alternatively copy paste below directly into kitty.conf

foreground            #ebdbb2
background            #1d2021
selection_foreground  #ebdbb2
selection_background  #458588

url_color #fe8019

# black
color0  #1d2021
color8  #928374

# red
color1  #cc241d
color9  #fb4934

# green
color2  #98971a
color10 #b8bb26

# yellow
color3  #d79921
color11 #fabd2f

# blue
color4  #458588
color12 #83a598

# magenta
color5  #b16286
color13 #d3869b

# cyan
color6  #689d6a
color14 #8ec07c

# white
color7  #a89984
color15 #ebdbb2

# Cursor colors
cursor            #ebdbb2
cursor_text_color #1d2021

# Tab bar colors
active_tab_foreground   #ebdbb2
active_tab_background   #458588
inactive_tab_foreground #a89984
inactive_tab_background #32302f

# Marks
mark1_foreground #1d2021
mark1_background #fabd2f

# Splits/Windows
active_border_color #458588
inactive_border_color #32302f
