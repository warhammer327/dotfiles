add_newline = false

# Use custom format
format = """
[┌───────────────────>](bold green)$time
[│](bold green)$directory$git_branch$git_commit$git_state$git_status
[└─>](bold green) """


[line_break]
disabled = false

[cmd_duration]
min_time = 20_000  # Show command duration over 10,000 milliseconds (=20 sec)
format = " took [$duration]($style)"

[time]
time_format = "%k:%M"
format = "🕙$time($style) "
style = "bright-white"
disabled = false
    

[directory]
truncation_length = 5
format = "[$path]($style)[$lock_symbol]($lock_style)"

[package]
disabled = true

[character]
error_symbol = """
[┌───────────────────>](bold red)$time
[│](bold red)$directory$git_branch$git_commit$git_state$git_status
[└─>](bold red) """


[git_branch]
format = " [$symbol$branch]($style) "
symbol = "🍣"
style = "bold yellow"

[git_commit]
commit_hash_length = 8
style = "bold white"

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '

[git_status]
conflicted = "⚔️ "
ahead = "🏎️ 💨×${count}"
behind = "🐢×${count}"
diverged = "🔱 🏎️ 💨×${ahead_count} 🐢×${behind_count}"
untracked = "🛤️ ×${count}"
stashed = "📦"
modified = "📝×${count}"
staged = "🗃️×${count}"
renamed = "📛×${count}"
deleted = "🗑️×${count}"
style = "bright-white"
format = "$all_status$ahead_behind"
