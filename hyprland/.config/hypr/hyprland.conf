#######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
#######################################################################################

# Hyprland already allows switching natively, check that first
# Make capslock behave like escape
# git clone git@github.com:rvaiya/keyd.git

# Install swaync for notification

#######################################################################################
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

#autogenerated = 1 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = eDP-1, 1920x1200, 0x0, 1
#monitor = HDMI-A-2, 1920x1080, 0x-1080, 1


# Execute your favorite apps at launch
exec-once = hyprpaper & swaync
exec-once = waybar
exec-once = hyprctl setcursor breeze_cursors 24
#exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'breeze_cursors'
#exec-once = gsettings set org.gnome.desktop.interface cursor-size 24

# Cursor theme settings
env = XCURSOR_THEME,breeze_cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,breeze_cursors
env = HYPRCURSOR_SIZE,24

# Wayland environment
env = WAYLAND_DISPLAY,wayland-1
env = XDG_SESSION_TYPE,wayland

# Set QT env for hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_STYLE_OVERRIDE,kvantum

# Set programs that you use
$terminal    = kitty
$fileManager = nautilus
$menu        = rofi -show drun
$browser     = zen
#$browser     = brave-browser


input {
  kb_layout  = us
  kb_variant =
  kb_model   =
  kb_options =
  kb_rules   =

  follow_mouse = 1

  touchpad {
    natural_scroll = no
  }

  sensitivity = 0.6 # -1.0 to 1.0, 0 means no modification.
}

general {
  gaps_in               = 8
  gaps_out              = 10
  border_size           = 2
  col.active_border     = rgb(683D0C) rgb(151A18) 135deg
  col.inactive_border   = rgba(0B0C1366)
  no_border_on_floating = false
  layout                = dwindle
  allow_tearing         = false
}

decoration {
  rounding = 5

  blur {
    enabled           = true
    size              = 5
    passes            = 2
    new_optimizations = true
  }

  # drop_shadow = yes
  # shadow_range = 18
  # shadow_render_power = 3
  # col.shadow = rgba(1a1a1aee)
}

#animations {
#  enabled = yes
#
#  bezier    = myBezier, 0.05, 0.9, 0.1, 1.05
#  animation = windows, 1, 2, myBezier
#  animation = windowsOut, 1, 2, default, popin 80%
#  animation = border, 1, 5, default
#  animation = borderangle, 1, 3, default
#  animation = fade, 1, 4, default
#  animation = workspaces, 1, 1, default
#}


animations {
  enabled = yes

  bezier = fastInOut, 0.8, 0, 0.2, 1
  bezier = zoomSnap, 0.4, 0, 0.2, 1.4

  animation = windows, 1, 2, fastInOut, slide
  animation = windowsOut, 1, 2, fastInOut, slide
  animation = fade, 1, 3, fastInOut
  animation = border, 1, 4, fastInOut
  animation = borderangle, 1, 4, fastInOut
  animation = workspaces, 1, 1.2, fastInOut
}


dwindle {
  pseudotile      = yes
  preserve_split  = yes
}

master {
  # new_is_master = true
}

gestures {
  workspace_swipe_invert   = false
  workspace_swipe_distance = 25
}

misc {
  force_default_wallpaper   = 0
  disable_splash_rendering  = true
  disable_hyprland_logo     = true
}

device {
  name        = dell0b20:00-04f3:3146-touchpad
  sensitivity = 4
}

# Window rules
windowrulev2 = opacity 0.8 override 0.6 override 0.85 override, class:^(kitty|Slack|Code|io\.bassi\.Amberol|org\.kde\.dolphin|org\.pwmt\.zathura|org\.strawberrymusicplayer\.strawberry)
windowrulev2 = opacity 1.0 override 0.8 override 1.0 override, class:^(Thorium-browser)$
windowrulev2 = opacity 0.9 override 0.7 override 1.0 override, class:^(zen)$, title:^(Zen Browser)$
windowrulev2 = suppressevent maximize, class:.*

$mainMod = ALT

# Binds
bind = $mainMod, return, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, exec, $menu
bind = $mainMod, O, exec, $browser
bind = $mainMod, Y, pseudo,
bind = $mainMod, T, togglesplit

bind = $mainMod SHIFT, Q, exec, hyprlock
bind = $mainMod SHIFT, P, exec, /usr/bin/switch-power-profile.sh
bind = $mainMod, F, fullscreen

# Move focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u

# Swap windows
bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, l, swapwindow, r
bind = $mainMod SHIFT, j, swapwindow, d
bind = $mainMod SHIFT, k, swapwindow, u

# Resize active
bind = $mainMod CTRL, h, resizeactive, -60 0
bind = $mainMod CTRL, l, resizeactive,  60 0
bind = $mainMod CTRL, k, resizeactive,  0 -60
bind = $mainMod CTRL, j, resizeactive,  0  60

# Workspace to monitor
#workspace = 1, monitor:HDMI-A-2
#workspace = 2, monitor:HDMI-A-2
#workspace = 3, monitor:HDMI-A-2
#workspace = 4, monitor:HDMI-A-2
#workspace = 5, monitor:HDMI-A-2
#workspace = 6, monitor:HDMI-A-2
#workspace = 7, monitor:eDP-1
#workspace = 8, monitor:eDP-1
#workspace = 9, monitor:eDP-1
#workspace = 10, monitor:eDP-1

# Switch workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Special workspace
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Dragging windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 1%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 1%-

# Playerctl
bindl = $mainMod, XF86AudioRaiseVolume, exec, playerctl next
bindl = $mainMod, 74, exec, playerctl next
bindl = $mainMod, 73, exec, playerctl play-pause
bindl = $mainMod, XF86AudioLowerVolume, exec, playerctl previous
bindl = $mainMod, 72, exec, playerctl previous

# Screenshot
bind = $mainMod, 76, exec, hyprshot -m region
